name: Pipeline para revisar archivo

on:
  push:
    branches: ["main"]

jobs:
  saludos:
    runs-on: ubuntu-latest

    steps:
      - name: checkout del codigo
        uses: actions/checkout@v4

      - name: Usar NODE JS
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      
      - name: Construir app con node
        run: npm install

      - name: Verificar si app.js existe
        run: |
          if [ -f "app.js" ]; then
            echo "No se encontro app.js en la raiz."
            exit 1
          fi
          echo "Se encontro app.js. Continuando con el workflow."